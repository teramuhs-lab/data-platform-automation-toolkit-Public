# =============================================
# GitHub Actions Pipeline: SQL Server Database CI/CD
# =============================================
# Full database deployment lifecycle:
#   Validate → Build → Deploy Dev → DB Tests → Deploy Staging → Deploy Prod
#
# Prerequisites in GitHub:
#   - Repository secret: DBOPS_SQL_PASSWORD
#   - Environments: dev, staging, prod (with protection rules on staging/prod)
#
# Learn more:
#   - Environments: https://docs.github.com/en/actions/deployment/targeting-different-environments
#   - Concurrency:  https://docs.github.com/en/actions/using-jobs/using-concurrency

name: Database CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'database/**'
      - 'src/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# -----------------------------------------------
# Job 1: Validate (lint, tests, SQL naming)
# -----------------------------------------------
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint check
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

  validate-sql:
    name: Validate SQL Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check migration naming convention
        run: |
          echo "Validating migration script naming..."
          errors=0
          for f in database/migrations/*.sql; do
            basename=$(basename "$f")
            if [[ ! "$basename" =~ ^V[0-9]{3}__.+\.sql$ ]]; then
              echo "::error file=$f::Invalid migration name: $basename (expected V###__description.sql)"
              errors=$((errors + 1))
            fi
          done
          if [ $errors -gt 0 ]; then
            echo "::error::$errors migration script(s) have invalid names"
            exit 1
          fi
          echo "All migration scripts follow naming convention."

      - name: Check seed data naming convention
        run: |
          for f in database/seed-data/*.sql; do
            basename=$(basename "$f")
            if [[ ! "$basename" =~ ^R[0-9]{3}__.+\.sql$ ]]; then
              echo "::error file=$f::Invalid seed script name: $basename (expected R###__description.sql)"
              exit 1
            fi
          done
          echo "All seed scripts follow naming convention."

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=dbops --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t dbops:${{ github.sha }} .

      - name: Verify CLI runs in container
        run: docker run --rm dbops:${{ github.sha }} --help

  # -----------------------------------------------
  # Job 2: Deploy to Dev (automatic on main)
  # -----------------------------------------------
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: [lint, validate-sql, unit-tests, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: dev

    # --- SQL Server service container (runs alongside the job) ---
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: 'Y'
          MSSQL_SA_PASSWORD: 'CiTest!Strong2026'
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'CiTest!Strong2026' -C -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DBOPS_SQL_PASSWORD: 'CiTest!Strong2026'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ODBC Driver 18
        run: |
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 || {
            curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | sudo tee /usr/share/keyrings/microsoft-prod.asc > /dev/null
            curl -fsSL https://packages.microsoft.com/config/ubuntu/$(lsb_release -rs)/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
            sudo apt-get update
            sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18
          }
          odbcinst -q -d

      - name: Install dbops CLI
        run: pip install -e .

      - name: Wait for SQL Server to be ready
        run: |
          for i in $(seq 1 30); do
            python -c "
          import pyodbc
          try:
              conn = pyodbc.connect(
                  'DRIVER={ODBC Driver 18 for SQL Server};SERVER=127.0.0.1,1433;UID=sa;PWD=CiTest!Strong2026;Encrypt=no;TrustServerCertificate=yes;',
                  timeout=5
              )
              print('SQL Server is ready')
              conn.close()
              exit(0)
          except Exception as e:
              print(f'Attempt {$i}: {e}')
              exit(1)
          " && break || sleep 2
          done

      - name: Migration dry run
        run: dbops migrate --config config/env-dev.yml --database dbops_dev --dry-run

      - name: Apply migrations and seed data
        run: dbops migrate --config config/env-dev.yml --database dbops_dev

      - name: Run database tests
        run: dbops migrate --config config/env-dev.yml --database dbops_dev --test

      - name: Post-deploy drift check
        run: dbops drift-check --config config/env-dev.yml --database dbops_dev

      - name: Post-deploy health check
        run: dbops healthcheck --config config/env-dev.yml

  # -----------------------------------------------
  # Job 3: Deploy to Staging (requires environment approval)
  # -----------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [deploy-dev]
    environment:
      name: staging                          # Configure required reviewers in GitHub settings
    env:
      DBOPS_SQL_PASSWORD: ${{ secrets.DBOPS_SQL_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dbops CLI
        run: pip install -e .

      - name: Migration dry run
        run: dbops migrate --config config/env-staging.yml --database dbops_staging --dry-run

      - name: Apply migrations and run DB tests
        run: dbops migrate --config config/env-staging.yml --database dbops_staging --test

      - name: Post-deploy drift check
        run: dbops drift-check --config config/env-staging.yml --database dbops_staging

  # -----------------------------------------------
  # Job 4: Deploy to Production (requires environment approval)
  # -----------------------------------------------
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    environment:
      name: production                       # Configure required reviewers + wait timer
    env:
      DBOPS_SQL_PASSWORD: ${{ secrets.DBOPS_SQL_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dbops CLI
        run: pip install -e .

      - name: Migration dry run (review output)
        run: dbops migrate --config config/env-prod.yml --database dbops_prod --dry-run

      - name: Apply migrations and validate
        run: dbops migrate --config config/env-prod.yml --database dbops_prod --test

      - name: Post-deploy drift check
        run: dbops drift-check --config config/env-prod.yml --database dbops_prod

      - name: Production health check
        run: dbops healthcheck --config config/env-prod.yml
