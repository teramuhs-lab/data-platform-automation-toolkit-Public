# Production environment configuration — Azure SQL
environment: prod
sql:
  driver: "ODBC Driver 18 for SQL Server"
  server: "${DB_HOST_PROD}"
  database: "dbops_prod"
  username: "${DB_ADMIN_USERNAME}"
  password_env: "DBOPS_SQL_PASSWORD"
options:
  encrypt: true
  trust_server_certificate: false
  connection_timeout: 30
backup:
  backup_dir: "/backups"
  compression: true
  verify: true
