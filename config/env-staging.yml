# Staging environment configuration — Azure SQL
environment: staging
sql:
  driver: "ODBC Driver 18 for SQL Server"
  server: "${DB_HOST_STAGING}"
  database: "dbops_staging"
  username: "${DB_ADMIN_USERNAME}"
  password_env: "DBOPS_SQL_PASSWORD"
options:
  encrypt: true
  trust_server_certificate: false
  connection_timeout: 120
backup:
  backup_dir: "/backups"
  compression: true
  verify: true
